front:
  text: 御製大悲總持經呪序朕聞觀自在菩薩誓願入微塵國土拯拔一切有情離諸苦趣故説是無量功德總持經呪世間善男子善女人一切衆生秉心至誠持誦佩服此經呪者種種惡趣種種苦害咸相遠離咸得圓融超登妙道若此海波霑濡下風吹觸業釋障消獲是勝果非但耳之所聞實目之所覩明效大驗者也若智慧福德之士根器深厚堅持佩誦勤行不輟又能廣為演説是經呪功德不可思議若薄福不信者亦心生信解亦得同超佛境真實不虛夫觀世音誓願弘深發大悲心以濟度群生朕君臨天下閔衆情之昏瞀墮五濁而不知以此經呪用是方便覺悟提撕俾一切庶類皆超佛域又況如來化導首重忠孝凡忠臣孝子能盡心以事君竭力以事親所作所為無私智陂行廣積陰功濟人利物又能持誦是經呪則跬步之間即見如來若彼不忠不孝不知敬畏則鬼神所録陰加譴罰轉眄之間即成地獄蓋善惡兩途由人所趨凡我衆庶宜慎取舍書此以為勸永樂九年六月日
